<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimovies Scraper Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .search-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .search-card:hover {
            transform: translateY(-2px);
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-container {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
        }

        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .server-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            transition: all 0.2s;
        }

        .server-card:hover {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
        }

        .server-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .server-status {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-available { background: var(--success); }
        .status-unavailable { background: #ef4444; }

        .link-btn {
            display: block;
            margin-top: 0.75rem;
            text-align: center;
            text-decoration: none;
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.4rem;
            border-radius: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            transition: all 0.2s;
        }

        .link-btn:hover {
            background: var(--primary);
            color: white;
        }

        .download-list {
            list-style: none;
        }

        .download-item {
            background: rgba(30, 41, 59, 0.5);
            margin-bottom: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .download-url {
            color: var(--text-muted);
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Multimovies Scraper</h1>
        <p class="subtitle">Extract embed URLs and server links instantly</p>

        <div class="search-card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste Multimovies URL here..." value="https://multimovies.fyi/movies/game-changer/">
                <button id="scrapeBtn">
                    <span id="btnText">Scrape Now</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <div id="resultContainer" class="result-container">
            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Streaming Servers
            </div>
            <div id="serverGrid" class="server-grid"></div>

            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Direct Downloads
            </div>
            <div id="downloadList" class="download-list"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const scrapeBtn = document.getElementById('scrapeBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resultContainer = document.getElementById('resultContainer');
        const serverGrid = document.getElementById('serverGrid');
        const downloadList = document.getElementById('downloadList');
        const errorMsg = document.getElementById('errorMsg');

        scrapeBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;

            // UI Reset
            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            scrapeBtn.disabled = true;
            loader.style.display = 'block';
            btnText.style.display = 'none';

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Scraping failed');
                }

                // Render Servers
                serverGrid.innerHTML = data.servers.map(s => `
                    <div class="server-card">
                        <div class="server-name">${s.serverName}</div>
                        <div class="server-status">
                            <span class="status-dot ${s.available ? 'status-available' : 'status-unavailable'}"></span>
                            ${s.available ? 'Available' : 'Unavailable'}
                        </div>
                        ${s.url ? `<a href="${s.url}" target="_blank" class="link-btn">Open Player</a>` : ''}
                    </div>
                `).join('');

                // Render Downloads
                if (data.downloads && data.downloads.length > 0) {
                    downloadList.innerHTML = data.downloads.map(url => `
                        <div class="download-item">
                            <div class="download-url">${url}</div>
                            <a href="${url}" target="_blank" class="link-btn">Download</a>
                        </div>
                    `).join('');
                } else {
                    downloadList.innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">No direct downloads found.</p>';
                }

                resultContainer.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                scrapeBtn.disabled = false;
                loader.style.display = 'none';
                btnText.style.display = 'block';
            }
        });
    </script>
</body>
</html>
